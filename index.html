<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Breech Motivation</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <div class="background-stage" aria-hidden="true">
        <div class="background-image background-image--active" id="bgCurrent"></div>
        <div class="background-image background-image--next" id="bgNext"></div>
        <div class="background-overlay"></div>
        <div class="background-glow"></div>
      </div>

      <header class="top-bar">
        <div class="clock-panel">
          <div class="time">
            <span class="time__digits" id="timeText"></span>
            <span class="time__period" id="timePeriod"></span>
          </div>
          <p class="date" id="dateText"></p>
        </div>

        <div class="status-tools">
          <div class="status-pill" id="statusPill">Daily mode</div>
          <button
            class="wallpaper-dot"
            id="wallpaperDot"
            type="button"
            aria-label="Change wallpaper"
            title="Change wallpaper"
          ></button>
        </div>
      </header>

      <section class="message-stage" aria-label="Motivation messages">
        <div class="message-rail" id="messageRail">
          <article class="message-card message-card--small" data-focus-card>
            <p class="message-card__eyebrow">Warm up</p>
            <h2 id="warmUpText"></h2>
          </article>

          <article class="message-card message-card--small" data-focus-card>
            <p class="message-card__eyebrow">Momentum</p>
            <h2 id="momentumText"></h2>
          </article>

          <article class="message-card message-card--large" data-focus-card>
            <p class="message-card__eyebrow">Focus</p>
            <h1 id="focusText"></h1>
          </article>

          <section class="hero-panel message-card message-card--quote" data-focus-card>
            <div class="quote-shell" id="quoteShell">
              <div class="quote-meta">
                <p class="category-badge" id="categoryBadge">Loading</p>
                <span class="quote-countdown" id="quoteCountdown">05:00</span>
              </div>
              <blockquote class="quote-text" id="quoteText">Preparing your next quote...</blockquote>
              <p class="quote-source" id="quoteSource">Loading source</p>
              <p class="quote-type" id="quoteType"></p>
            </div>
          </section>

          <article class="message-card message-card--large" data-focus-card>
            <div class="bro-talk-shell" id="disciplineShell">
              <div class="message-card__meta">
                <p class="message-card__eyebrow" id="disciplineEyebrow">Bro Talk</p>
                <span class="message-card__countdown" id="disciplineCountdown">05:00</span>
              </div>
              <h1 id="disciplineText">The screen is fixed, but the message stack still glides through focus.</h1>
            </div>
          </article>

          <article class="message-card message-card--small" data-focus-card>
            <div class="message-card__meta">
              <p class="message-card__eyebrow" id="broTalkEyebrow">Bro Talk</p>
              <span class="message-card__countdown" id="broTalkCountdown">05:00</span>
            </div>
            <h2 id="broTalkText">That gives you the effect without making the whole page move.</h2>
          </article>

          <article class="message-card message-card--tiny" data-focus-card>
            <p class="message-card__eyebrow">Finish</p>
            <h3 id="finishText"></h3>
          </article>
        </div>
      </section>
    </main>

    <script src="index.js"></script>
  </body>
</html>
